---
layout: default
---
{% assign none = "" | split: "" %}
{% assign tagged = site.tags[page.tag] | default: none %}
<article class="page-shell">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    <p class="intro-note">{{ tagged.size }} essay{% if tagged.size != 1 %}s{% endif %} tagged <strong>{{ page.tag }}</strong>.</p>
  </header>
  {% include essay-list.html posts=tagged %}
</article>

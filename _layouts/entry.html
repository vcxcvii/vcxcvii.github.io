---
layout: default
---
<section id="primary" class="entry-primary">
  <article class="entry-shell">
    <header class="entry-header">
      <h1>{{ page.title }}</h1>
      <p class="entry-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%-d %b %Y" }}</time>
      </p>
      {% if page.tags and page.tags.size > 0 %}
        <p class="entry-tags" aria-label="Tags">
          {% for tag in page.tags %}
            {% assign tag_slug = tag | slugify %}
            <a class="tag-link" href="{{ '/tags/' | append: tag_slug | append: '/' | relative_url }}">#{{ tag }}</a>
          {% endfor %}
        </p>
      {% endif %}
    </header>

    <div class="prose entry-prose">
      {{ content }}
    </div>
  </article>
</section>

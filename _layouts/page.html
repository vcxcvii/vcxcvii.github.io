---
layout: default
---
<section id="primary"{% if page.page_class %} class="{{ page.page_class }}"{% endif %}>
  <p class="section-label">{{ page.title }}</p>

  <article class="page-shell">
    <header class="page-header">
      <h1>{{ page.title }}</h1>
      {% if page.intro %}
        <p class="intro-note">{{ page.intro }}</p>
      {% endif %}
    </header>

    <div class="prose">
      {{ content }}
    </div>
  </article>
</section>

{% unless page.no_sidebar %}
  {% include sidebar.html %}
{% endunless %}

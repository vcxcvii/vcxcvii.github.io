---
layout: default
---
<article class="page-shell{% if page.page_class %} {{ page.page_class }}{% endif %}">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    {% if page.intro %}<p class="intro-note">{{ page.intro }}</p>{% endif %}
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>

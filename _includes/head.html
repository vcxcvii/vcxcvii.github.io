{% if jekyll.environment == 'production' and site.github.build_revision %}
  {% assign asset_version = site.github.build_revision %}
{% else %}
  {% assign asset_version = site.time | date: '%s' %}
{% endif %}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>{% include theme-init.js %}</script>
<meta name="color-scheme" content="light dark">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'sha256-Dj+i4IDnpvqmthMc2zXOyDC093BXb7M1pd2cFiBFT3I=' 'sha256-LJuA7cKL+a98sUtNXqbIcPAA7wH7s5cgM64Av4Zr6ks=' https://www.googletagmanager.com https://*.clarity.ms; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://www.google-analytics.com https://*.clarity.ms https://avatars.githubusercontent.com; font-src 'self'; connect-src https://www.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net https://*.clarity.ms https://github-contributions-api.jogruber.de ws://localhost:*; object-src 'none'; base-uri 'self'; form-action 'none'; upgrade-insecure-requests">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" data-theme-light>
<meta name="theme-color" content="#18181b" media="(prefers-color-scheme: dark)" data-theme-dark>
<meta name="google-site-verification" content="v48CxEycPMCjgwT_ovhFQKTQIt0tdSIvaFsj4oFuMec">
<link rel="preconnect" href="https://www.googletagmanager.com">
<link rel="preconnect" href="https://www.clarity.ms">
<link rel="dns-prefetch" href="https://www.googletagmanager.com">
<link rel="dns-prefetch" href="https://www.clarity.ms">
<link rel="apple-touch-icon" href="{{ '/assets/images/favicon.png' | relative_url }}?v={{ asset_version }}">
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: page.intro | default: site.description | strip_html | strip }}">
<link rel="canonical" href="{{ page.url | prepend: site.url }}">
<meta property="og:title" content="{{ page.title | default: site.title | escape }}">
<meta property="og:description" content="{{ page.description | default: page.intro | default: site.description | strip_html | strip | escape }}">
<meta property="og:url" content="{{ page.url | prepend: site.url }}">
<meta property="og:type" content="{% if page.layout == 'entry' %}article{% else %}website{% endif %}">
<meta property="og:image" content="{{ '/assets/images/varun-choraria-about.jpeg' | prepend: site.url }}">
<meta property="og:site_name" content="{{ site.title | escape }}">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ page.title | default: site.title | escape }}">
<meta name="twitter:description" content="{{ page.description | default: page.intro | default: site.description | strip_html | strip | escape }}">
<meta name="twitter:image" content="{{ '/assets/images/varun-choraria-about.jpeg' | prepend: site.url }}">
<style>{% capture inline_scss %}@import "main";{% endcapture %}{{ inline_scss | scssify }}</style>
<link rel="stylesheet" href="{{ '/assets/css/nav.css' | relative_url }}?v={{ asset_version }}" media="print" data-async-css>
<noscript><link rel="stylesheet" href="{{ '/assets/css/nav.css' | relative_url }}?v={{ asset_version }}"></noscript>
<link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}?v={{ asset_version }}" type="image/svg+xml">
<link rel="icon" href="{{ '/assets/images/favicon.png' | relative_url }}?v={{ asset_version }}" type="image/png">
<!-- Analytics (gtag + Clarity), deferred to idle after load -->
<script>
window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}
window.clarity=window.clarity||function(){(window.clarity.q=window.clarity.q||[]).push(arguments)};
window.addEventListener('load',function(){
  (window.requestIdleCallback||function(f){setTimeout(f,1)})(function(){
    var g=document.createElement('script');g.async=1;g.src='https://www.googletagmanager.com/gtag/js?id=G-S0VEY2SVJ3';document.head.appendChild(g);
    gtag('js',new Date());gtag('config','G-S0VEY2SVJ3');
    var c=document.createElement('script');c.async=1;c.src='https://www.clarity.ms/tag/xch3frdjl8';document.head.appendChild(c);
  });
});
</script>

<div id="nav-root" data-nav='{{ site.data.navigation | jsonify }}' data-current="{{ page.url }}"></div>
<noscript>
  <nav class="nav-fallback" aria-label="Primary">
    {% for item in site.data.navigation %}
      <a href="{{ item.url | relative_url }}">{{ item.label }}</a>
    {% endfor %}
  </nav>
</noscript>
<script defer src="{{ '/assets/js/nav.js' | relative_url }}?v={{ asset_version }}"></script>

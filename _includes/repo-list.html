<ul class="repo-list">
  {% for quest in site.data.quests %}
    {% if quest.featured %}
      <li>
        <a class="repo-link" href="{{ quest.link }}" target="_blank" rel="noopener noreferrer">
          {% include logo.html name=quest.icon %}
          <span>{{ quest.name }}</span>
        </a>
        <p>{{ quest.description }}</p>
      </li>
    {% endif %}
  {% endfor %}
</ul>

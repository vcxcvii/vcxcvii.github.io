title: VC's Notes
description: Notes on GTM, marketing, career and other side quests
url: "https://www.varunchoraria.com"
baseurl: ""
timezone: Asia/Kolkata
markdown: kramdown
highlighter: rouge
permalink: /:slug/
plugins:
  - jekyll-sitemap
  - jekyll-feed

sass:
  style: compressed
  sourcemap: never
exclude:
  - DESIGN.md
  - README.md
  - Gemfile
  - Gemfile.lock

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
  - scope:
      path: ""
      type: "posts"
    values:
      layout: entry
      section_name: Note

title: Varun Choraria
description: Essays on AI, go-to-market strategy, management, careers, and building useful things from B2B marketing operator Varun Choraria.
author_description: B2B SaaS marketing consultant and operator writing about go-to-market strategy, management, careers, AI, and side projects.
author:
  name: Varun Choraria
  uri: https://www.varunchoraria.com/about/
url: "https://www.varunchoraria.com"
baseurl: ""
timezone: Asia/Kolkata
markdown: kramdown
highlighter: rouge
permalink: /:slug/
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from

sass:
  style: compressed
  sourcemap: never
exclude:
  - DESIGN.md
  - README.md
  - Gemfile
  - Gemfile.lock
  - frontend

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
  - scope:
      path: ""
      type: "posts"
    values:
      layout: entry
      section_name: Note

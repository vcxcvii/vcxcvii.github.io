title: VC's Notes
description: Notes on GTM, product marketing, management, and side quests.
url: ""
baseurl: ""
timezone: Asia/Kolkata
markdown: kramdown
highlighter: rouge
permalink: /:slug/
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
  - scope:
      path: ""
      type: "posts"
    values:
      layout: entry
      section_name: Entry

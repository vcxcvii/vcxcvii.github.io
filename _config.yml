title: VC's Notes
description: Notes on GTM, marketing, career and other side quests
url: "https://www.varunchoraria.com"
baseurl: ""
timezone: Asia/Kolkata
markdown: kramdown
highlighter: rouge
permalink: /:slug/
plugins:
  - jekyll-sitemap

sass:
  style: compressed
  sourcemap: never
exclude:
  - DESIGN.md
  - README.md
  - Gemfile
  - Gemfile.lock

collections:
  til:
    output: true
    permalink: /til/:slug/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
  - scope:
      path: ""
      type: "posts"
    values:
      layout: entry
      section_name: Note
  - scope:
      path: ""
      type: "til"
    values:
      layout: entry
      section_name: TIL
